<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FaceHealth</title>
  <meta name="description" content="Secure login to the FaceHealth patient recognition system">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* Login page overrides — no body gradient, fullscreen center */
    body {
      background: radial-gradient(ellipse at 30% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                  var(--bg-primary);
      animation: none;
    }
    body::before, body::after { display: none; }
  </style>
</head>
<body>
  <!-- Floating Particles Background -->
  <div class="particles"></div>

  <div class="login-page">
    <div class="login-card">
      <!-- Animated Brand Icon -->
      <div class="brand-pulse">🏥</div>

      <h2>Welcome Back</h2>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Login Form -->
      <form method="POST" id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" style="width:100%; padding:14px; font-size:0.95rem; justify-content:center; margin-top:8px;">
          Sign In
        </button>
      </form>

      <p style="text-align:center; margin-top:16px; font-size:0.78rem; color:var(--text-muted);">
        Secure healthcare face recognition portal
      </p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
</body>
</html>
